<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Title -->
        <title>Lupa Password - Mega Nusa Travel</title>

        <!-- Tailwind CSS -->
        <script src="https://cdn.tailwindcss.com"></script>

        <!-- Alpine JS -->
        <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

        <!-- Lucide Icons -->
        <script src="https://unpkg.com/lucide@latest"></script>

        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            primary: "#0011FF",
                            secondary: "#FFEB00",
                        },
                    },
                },
            };
        </script>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />

        <!-- CLOAK STYLE -->
        <style>
            [x-cloak] {
                display: none !important;
            }

            html,
            body,
            main,
            section {
                overflow-x: hidden;
            }
        </style>

        <style>
            @keyframes gradient-x {
                0%,
                100% {
                    background-position: 0%;
                }
                50% {
                    background-position: 100%;
                }
            }

            .animate-gradient-x {
                background-size: 200% auto;
                animation: gradient-x 3s linear infinite;
            }
        </style>
    </head>
    <body class="bg-gradient-to-b from-gray-200/75 to-white min-h-screen h-screen flex items-center justify-center">
        <!-- WRAPPER -->
        <section class="w-full px-4 h-full flex items-center justify-center">
            <div class="md:max-w-5xl mx-auto grid w-full md:grid-cols-2 bg-white rounded-2xl shadow-2xl overflow-hidden">
                <!-- LEFT (INFO / BRANDING) -->
                <div class="hidden md:flex flex-col justify-center p-10 text-white relative overflow-hidden">
                    <!-- BACKGROUND IMAGE -->
                    <img src="https://digital-bucket-v3.prod.bfi.co.id/assets/Blog/Blog%20New/Inspiratif%21%20Begini%20Cara%20Memulai%20Usaha%20Travel%20Mobil%20Keuntungan%20Berlipat/Usaha%20Travel%20Mobil.jpg" class="absolute inset-0 w-full h-full object-cover" alt="Travel Background" />

                    <!-- OVERLAY GRADIENT -->
                    <div class="absolute inset-0 bg-gradient-to-br from-primary/80 via-sky-500/70 to-primary/80"></div>

                    <!-- CONTENT -->
                    <div class="relative z-10">
                        <h2 class="text-3xl font-bold mb-4">
                            Selamat Datang di
                            <span class="block bg-gradient-to-r from-secondary via-yellow-300 to-secondary bg-clip-text text-transparent animate-gradient-x"> Mega Nusa Travel </span>
                        </h2>

                        <p class="text-white/90 text-sm leading-relaxed">Kelola pemesanan travel Anda dengan mudah, cepat, dan efisien dalam satu dashboard.</p>
                    </div>

                    <!-- DECOR -->
                    <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-white/10 rounded-full blur-2xl"></div>
                </div>

                <!-- RIGHT (FORM LOGIN) -->
                <!-- RIGHT (FORM LUPA PASSWORD) -->
                <div class="p-8 md:p-10">
                    <!-- HEADER -->
                    <div class="mb-8 text-center md:text-left">
                        <!-- BACK BUTTON -->
                        <div class="mb-4">
                            <a href="/login" class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-slate-50 hover:bg-white shadow-sm hover:shadow-md transition-all duration-300 group">
                                <i class="bi bi-arrow-left text-gray-700 transition-all duration-300 group-hover:-translate-x-1 group-hover:scale-110"> </i>

                                <span class="text-sm text-gray-700 font-medium transition-all duration-300 group-hover:-translate-x-0.5"> Kembali </span>
                            </a>
                        </div>

                        <h2 class="text-2xl font-bold text-gray-800 mb-2">Lupa Password</h2>
                        <p class="text-gray-500 text-sm">Masukkan email Anda, kami akan bantu reset melalui WhatsApp</p>
                    </div>

                    <!-- FORM -->
                    <form id="forgotForm" class="space-y-5">
                        <!-- EMAIL -->
                        <div>
                            <label class="text-sm text-gray-600">Email</label>
                            <div class="mt-1 relative">
                                <input id="email" type="email" placeholder="Masukkan email Anda" class="w-full border rounded-xl px-4 py-3 pl-10 text-sm focus:outline-none focus:ring-2 focus:ring-primary transition" required />

                                <i class="bi bi-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            </div>
                        </div>

                        <!-- BUTTON -->
                        <button type="submit" class="w-full inline-flex items-center justify-center gap-2 bg-primary text-white font-semibold py-3 rounded-xl shadow-md hover:shadow-2xl hover:-translate-y-0.5 transition-all duration-300 group hover:bg-gradient-to-r hover:from-primary hover:via-sky-500 hover:to-primary">
                            Minta Reset Password

                            <i class="bi bi-whatsapp transition-transform duration-300 group-hover:scale-110"></i>
                        </button>
                    </form>

                    <!-- FOOTER -->
                    <p class="text-center text-gray-500 text-xs mt-6">© 2026 Mega Nusa Travel</p>
                </div>
            </div>
        </section>

        <script>
            lucide.createIcons();
        </script>

        <script>
            const form = document.getElementById("forgotForm");

            form.addEventListener("submit", function (e) {
                e.preventDefault();

                const email = document.getElementById("email").value.trim();

                if (!email) {
                    alert("Email wajib diisi!");
                    return;
                }

                const phone = "6285162930474";

                const message = `Halo Admin Mega Nusa Travel 👋
Saya ingin melakukan reset password.

📧 Email: ${email}

Mohon bantuannya, terima kasih 🙏`;

                const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

                window.open(url, "_blank");
            });
        </script>
    </body>
</html>
