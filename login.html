<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Title -->
        <title>Login - Mega Nusa Travel</title>

        <!-- Tailwind CSS -->
        <script src="https://cdn.tailwindcss.com"></script>

        <!-- Alpine JS -->
        <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

        <!-- Lucide Icons -->
        <script src="https://unpkg.com/lucide@latest"></script>

        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            primary: "#0011FF",
                            secondary: "#FFEB00",
                        },
                    },
                },
            };
        </script>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />

        <!-- CLOAK STYLE -->
        <style>
            [x-cloak] {
                display: none !important;
            }

            html,
            body,
            main,
            section {
                overflow-x: hidden;
            }
        </style>

        <style>
            @keyframes gradient-x {
                0%,
                100% {
                    background-position: 0%;
                }
                50% {
                    background-position: 100%;
                }
            }

            .animate-gradient-x {
                background-size: 200% auto;
                animation: gradient-x 3s linear infinite;
            }
        </style>
    </head>
    <body class="min-h-screen flex items-center justify-center relative overflow-hidden">
        <!-- BACKGROUND IMAGE -->
        <img src="assets/bg-login.webp" class="absolute inset-0 w-full h-full object-cover" />

        <!-- OVERLAY -->
        <div class="absolute inset-0"></div>

        <!-- WRAPPER -->
        <section class="w-full px-4 relative z-10 flex items-center justify-center">
            <div class="md:max-w-5xl mx-auto grid w-full md:grid-cols-2 bg-white rounded-2xl shadow-2xl overflow-hidden">
                <!-- LEFT (INFO / BRANDING) -->
                <div class="hidden md:flex flex-col justify-center p-10 text-white relative overflow-hidden">
                    <!-- BACKGROUND IMAGE -->
                    <img src="https://digital-bucket-v3.prod.bfi.co.id/assets/Blog/Blog%20New/Inspiratif%21%20Begini%20Cara%20Memulai%20Usaha%20Travel%20Mobil%20Keuntungan%20Berlipat/Usaha%20Travel%20Mobil.jpg" class="absolute inset-0 w-full h-full object-cover" alt="Travel Background" />

                    <!-- OVERLAY GRADIENT -->
                    <div class="absolute inset-0 bg-gradient-to-br from-primary/80 via-sky-500/70 to-primary/80"></div>

                    <!-- CONTENT -->
                    <div class="relative z-10">
                        <h2 class="text-3xl font-bold mb-4">
                            Selamat Datang di
                            <span class="block bg-gradient-to-r from-secondary via-yellow-300 to-secondary bg-clip-text text-transparent animate-gradient-x"> Mega Nusa Travel </span>
                        </h2>

                        <p class="text-white/90 text-sm leading-relaxed">Kelola pemesanan travel Anda dengan mudah, cepat, dan efisien dalam satu dashboard.</p>
                    </div>

                    <!-- DECOR -->
                    <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-white/10 rounded-full blur-2xl"></div>
                </div>

                <!-- RIGHT (FORM LOGIN) -->
                <div class="p-8 md:p-10">
                    <!-- HEADER -->
                    <div class="mb-8 text-center md:text-left">
                        <!-- BACK BUTTON -->
                        <div class="mb-4">
                            <a href="/" class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-slate-50 transition-all duration-300 group">
                                <!-- ICON -->
                                <i class="bi bi-arrow-left text-gray-700 transition-all duration-300 group-hover:-translate-x-1 group-hover:scale-110"> </i>

                                <!-- TEXT -->
                                <span class="text-sm text-gray-700 font-medium transition-all duration-300 group-hover:-translate-x-0.5"> Kembali </span>
                            </a>
                        </div>

                        <h2 class="text-2xl font-bold text-gray-800 mb-2">Login Admin</h2>
                        <p class="text-gray-500 text-sm">Silakan masuk untuk melanjutkan</p>
                    </div>

                    <!-- FORM -->
                    <form class="space-y-5">
                        <!-- EMAIL -->
                        <div>
                            <label class="text-sm text-gray-600">Email</label>
                            <div class="mt-1 relative">
                                <input type="email" placeholder="Masukkan email" class="w-full border rounded-xl px-4 py-3 pl-10 text-sm focus:outline-none focus:ring-2 focus:ring-primary transition" />

                                <i class="bi bi-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            </div>
                        </div>

                        <!-- PASSWORD -->
                        <div x-data="{ show: false }">
                            <label class="text-sm text-gray-600">Password</label>

                            <div class="mt-1 relative">
                                <input :type="show ? 'text' : 'password'" placeholder="Masukkan password" class="w-full border rounded-xl px-4 py-3 pl-10 pr-10 text-sm focus:outline-none focus:ring-2 focus:ring-primary transition" />

                                <i class="bi bi-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>

                                <button type="button" @click="show = !show" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
                                    <i :class="show ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
                                </button>
                            </div>
                        </div>

                        <!-- REMEMBER -->
                        <div class="flex items-center justify-between text-sm">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" class="rounded border-gray-300" />
                                <span class="text-gray-600">Ingat saya</span>
                            </label>

                            <a href="lupa-password.html" class="text-primary hover:underline"> Lupa password? </a>
                        </div>

                        <!-- BUTTON -->
                        <button type="submit" class="w-full inline-flex items-center justify-center gap-2 bg-primary text-white font-semibold py-3 rounded-xl shadow-md hover:shadow-2xl transition-all duration-300 group hover:bg-gradient-to-r hover:from-primary hover:via-sky-500 hover:to-primary">
                            Masuk

                            <i class="bi bi-arrow-right transition-transform duration-300 group-hover:translate-x-1"></i>
                        </button>
                    </form>

                    <!-- FOOTER -->
                    <p class="text-center text-gray-500 text-xs mt-6">© 2026 Mega Nusa Travel</p>
                </div>
            </div>
        </section>

        <script>
            lucide.createIcons();
        </script>
    </body>
</html>
